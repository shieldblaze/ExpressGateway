# cargo-audit policy. Mirrors deny.toml [advisories].ignore so both tools
# agree on what is allowed. Each entry must also exist in deny.toml with
# the same justification — keep them in sync.

[advisories]
ignore = [
    # instant is unmaintained but deeply transitive; no replacement yet
    "RUSTSEC-2024-0384",
    # protobuf recursion crash — we don't parse protobuf from untrusted sources
    "RUSTSEC-2024-0437",
    # rand unsound with custom logger — we don't use custom loggers with rand
    "RUSTSEC-2025-0015",
    # rustls-pemfile unmaintained
    "RUSTSEC-2025-0019",
    # dashmap unsound IterMut invalidating pointer
    "RUSTSEC-2024-0430",
    # dashmap v6 IterMut stacked borrows
    "RUSTSEC-2026-0002",
    # rand unsound with custom logger (v2)
    "RUSTSEC-2026-0097",
    # time <0.3.47 RFC 2822 stack-exhaustion DoS; MSRV 1.85 blocks the fix.
    # rcgen uses time only for internal cert-validity ranges, not RFC 2822
    # parsing of untrusted input. Revisit when MSRV bumps to 1.88.
    "RUSTSEC-2026-0009",
    # --- S34 re-sync with deny.toml. These two are ALREADY accepted in
    # deny.toml with full justifications; they were never mirrored here, so
    # cargo-audit failed while cargo-deny passed. Mirroring (not newly
    # relaxing): both are `unmaintained` advisories on transitive deps.
    # rustls-pemfile unmaintained (v2 advisory id; the v1 id 2025-0019 is above).
    "RUSTSEC-2025-0134",
    # yaml-rust 0.4 unmaintained. Transitive via foundations 4.5 (held in the
    # quiche cluster) -> serde_yaml 0.8 -> yaml-rust. foundations is
    # Cloudflare-maintained and ships in tokio-quiche; its YAML surface parses
    # only their telemetry config, never ExpressGateway-supplied input. Revisit
    # when Cloudflare moves foundations off serde_yaml 0.8.
    "RUSTSEC-2024-0320",
]
