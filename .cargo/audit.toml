# cargo-audit policy. Mirrors deny.toml [advisories].ignore so both tools
# agree on what is allowed. Each entry must also exist in deny.toml with
# the same justification — keep them in sync.

[advisories]
ignore = [
    # instant is unmaintained but deeply transitive; no replacement yet
    "RUSTSEC-2024-0384",
    # protobuf recursion crash — we don't parse protobuf from untrusted sources
    "RUSTSEC-2024-0437",
    # rand unsound with custom logger — we don't use custom loggers with rand
    "RUSTSEC-2025-0015",
    # rustls-pemfile unmaintained
    "RUSTSEC-2025-0019",
    # dashmap unsound IterMut invalidating pointer
    "RUSTSEC-2024-0430",
    # dashmap v6 IterMut stacked borrows
    "RUSTSEC-2026-0002",
    # rand unsound with custom logger (v2)
    "RUSTSEC-2026-0097",
    # (RUSTSEC-2026-0009 time<0.3.47 RFC 2822 DoS — DROPPED S37-D: time bumped to
    #  0.3.47, the fix, now that MSRV is 1.88. No longer applicable.)
    # --- S34 re-sync with deny.toml. These two are ALREADY accepted in
    # deny.toml with full justifications; they were never mirrored here, so
    # cargo-audit failed while cargo-deny passed. Mirroring (not newly
    # relaxing): both are `unmaintained` advisories on transitive deps.
    # rustls-pemfile unmaintained (v2 advisory id; the v1 id 2025-0019 is above).
    "RUSTSEC-2025-0134",
    # yaml-rust 0.4 unmaintained. Transitive via foundations 4.5.0 (HELD-BY-UPSTREAM:
    # quiche 0.29.1 -> qlog 0.18 -> foundations ^4) -> serde_yaml 0.8 -> yaml-rust.
    # foundations is Cloudflare-maintained and ships in tokio-quiche; its YAML surface
    # parses only their telemetry config, never ExpressGateway-supplied input. Revisit
    # once quiche/qlog adopt foundations 5.x.
    "RUSTSEC-2024-0320",
    # proc-macro-error2 unmaintained (RUSTSEC-2026-0173, NEW mid-S37). Build-time proc-macro
    # only (getset derive), never in the runtime binary; transitive via the same foundations
    # 4.5.0 held-by-upstream chain (foundations -> cf-rustracing-jaeger -> local-ip-address ->
    # neli -> getset -> proc-macro-error2). Unmaintained advisory, not a vuln. Mirrors deny.toml.
    "RUSTSEC-2026-0173",
]
