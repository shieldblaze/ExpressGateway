[workspace]
resolver = "2"
members = [
    "crates/core",
    "crates/config",
    "crates/xdp",
    "crates/runtime",
    "crates/tls",
    "crates/lb",
    "crates/health",
    "crates/pool",
    "crates/security",
    "crates/protocol-tcp",
    "crates/protocol-udp",
    "crates/protocol-http",
    "crates/protocol-h3",
    "crates/protocol-grpc",
    "crates/protocol-ws",
    "crates/compression",
    "crates/proxy-protocol",
    "crates/metrics",
    "crates/controlplane",
    "crates/agent",
    "crates/bootstrap",
]

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
io-uring = "0.7"
# XDP/eBPF
aya = "0.13"
# TLS
rustls = { version = "0.23", features = ["ring"] }
tokio-rustls = "0.26"
webpki-roots = "0.26"
rustls-pemfile = "2"
# HTTP
hyper = { version = "1", features = ["full"] }
hyper-util = { version = "0.1", features = ["full"] }
h2 = "0.4"
http = "1"
http-body-util = "0.1"
# QUIC / HTTP3
quinn = "0.11"
h3 = "0.0.8"
h3-quinn = "0.0.10"
# gRPC
tonic = "0.12"
prost = "0.13"
tonic-build = "0.12"
prost-build = "0.13"
# WebSocket
tokio-tungstenite = "0.24"
# Config
toml = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Compression
brotli = "7"
flate2 = "1"
zstd = "0.13"
# Metrics
prometheus = "0.13"
# Crypto
ring = "0.17"
# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
# Concurrency
crossbeam = "0.8"
dashmap = "6"
parking_lot = "0.12"
# Utilities
bytes = "1"
thiserror = "2"
anyhow = "1"
uuid = { version = "1", features = ["v4"] }
rand = "0.8"
arc-swap = "1"
notify = "7"
axum = "0.8"
murmur3 = "0.5"
md-5 = "0.10"
sha2 = "0.10"
lru = "0.12"
pin-project-lite = "0.2"
futures = "0.3"
async-trait = "0.1"
clap = { version = "4", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }
x509-parser = "0.16"
base64 = "0.22"
glob = "0.3"
http-body = "1"
tower = { version = "0.5", features = ["full"] }
tower-service = "0.3"
tokio-util = { version = "0.7", features = ["rt"] }

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"

[profile.dev]
opt-level = 0
debug = true
