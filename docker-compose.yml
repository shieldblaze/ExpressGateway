# ============================================================================
# ShieldBlaze ExpressGateway - Full Stack Local Development
# ============================================================================
#
# Usage:
#   docker compose build                  # Build all images
#   docker compose up -d                  # Start all services
#   docker compose up -d etcd loadbalancer  # Start minimal stack
#   docker compose logs -f loadbalancer   # Follow LB logs
#   docker compose down -v                # Stop and clean up
#

services:
  # ---- KV Store Backends (pick one) ----

  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.21
    command:
      - etcd
      - --name=etcd0
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=etcd0=http://etcd:2380
      - --initial-cluster-state=new
      - --auto-compaction-retention=1
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  consul:
    image: consul:1.15
    command: agent -server -bootstrap-expect=1 -client=0.0.0.0 -ui
    ports:
      - "8500:8500"
    profiles: ["consul"]
    healthcheck:
      test: ["CMD", "consul", "info"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: zookeeper:3.9
    ports:
      - "2181:2181"
    profiles: ["zookeeper"]
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Service Discovery ----

  service-discovery:
    build:
      context: .
      dockerfile: docker/Dockerfile.service-discovery
    ports:
      - "9110:9110"
    profiles: ["full"]
    healthcheck:
      test: ["CMD", "java", "-version"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---- Control Plane ----

  controlplane:
    build:
      context: .
      dockerfile: docker/Dockerfile.controlplane
    ports:
      - "9443:9443"
    volumes:
      - ./docker/config/controlplane:/etc/expressgateway/conf.d:ro
    depends_on:
      etcd:
        condition: service_healthy
    environment:
      CONFIGURATION_DIRECTORY: /etc/expressgateway/conf.d

  # ---- Load Balancer ----

  loadbalancer:
    build:
      context: .
      dockerfile: docker/Dockerfile.loadbalancer
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/config/loadbalancer:/etc/expressgateway/conf.d:ro
    depends_on:
      etcd:
        condition: service_healthy
    environment:
      CONFIGURATION_DIRECTORY: /etc/expressgateway/conf.d
