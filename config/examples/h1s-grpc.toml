# Example: gRPC over HTTP/2 (TLS) listener.
#
# gRPC requires HTTP/2, which is negotiated via ALPN on an `h1s` listener.
# The `[listeners.grpc]` block enables gRPC-specific handling (deadline
# clamping, synthesized health check). The backend speaks HTTP/2.
#
# Boot: `expressgateway config/examples/h1s-grpc.toml`

[[listeners]]
address = "0.0.0.0:8443"
protocol = "h1s"

[listeners.tls]
cert_path = "/etc/expressgateway/tls/cert.pem"
key_path  = "/etc/expressgateway/tls/key.pem"

[listeners.grpc]
enabled              = true
max_deadline_seconds = 300    # clamp client grpc-timeout above this
health_synthesized   = true   # serve /grpc.health.v1.Health/Check locally

[[listeners.backends]]
address  = "127.0.0.1:50051"
protocol = "h2"
weight   = 1  # accepted but not yet enforced (round-robin ignores weight in this build)
