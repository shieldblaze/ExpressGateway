[package]
name = "lb-quic"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false

[dependencies]
thiserror = { workspace = true }
bytes = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
parking_lot = { workspace = true }
quiche = { workspace = true }
tokio-quiche = { workspace = true }
# `ring::rand` for retry-secret generation and SCID sampling in the
# listener seam (Pillar 3b.3c-1). ring is already in the tree via
# quiche/BoringSSL's build — declaring it direct is cheap.
ring = "0.17"
lb-security = { path = "../lb-security" }

[dev-dependencies]
rcgen = { version = "0.13", features = ["pem"] }
tokio = { workspace = true, features = ["full", "test-util"] }
