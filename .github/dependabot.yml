version: 2

# Dependabot configuration: checks for dependency updates on a daily basis.
# You can adjust the package-ecosystem entries or add more as needed (e.g. "github-actions").
# See https://docs.github.com/en/code-security/supply-chain-security/keeping-your-dependencies-updated-automatically/configuration-options-for-dependency-updates
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 1
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 1
    groups:
      actions:
        patterns:
          - "*"
        # dtolnay/rust-toolchain is versioned by RUST TOOLCHAIN (e.g. @1.88),
        # not by action release. Dependabot's "*" group mistook the toolchain
        # tag for an action version and proposed a bogus @1.100 bump (#214).
        # Exclude it; the toolchain version is governed by rust-toolchain.toml.
        exclude-patterns:
          - "dtolnay/rust-toolchain"
