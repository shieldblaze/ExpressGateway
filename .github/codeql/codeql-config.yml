name: "ExpressGateway CodeQL Configuration"

# Use the default security-and-quality query suite, then exclude queries
# that produce false positives in a reverse-proxy / load-balancer context.
query-filters:
  # SSRF is the intended behavior of a reverse proxy -- it forwards requests
  # to pre-configured backend nodes based on load-balancer cluster selection.
  - exclude:
      id: java/ssrf

  # Load-balancer routing decisions are inherently based on user-controlled
  # request headers (Host, :authority, cookies for sticky sessions).
  - exclude:
      id: java/user-controlled-bypass

  # sun.misc.Signal is the only API for POSIX signal handling in Java.
  # Java 21 has no public replacement (JEP 260 acknowledged this gap).
  - exclude:
      id: java/jdk-internal-api-access

  # Method overloading in Netty handler hierarchies is required by the
  # framework (e.g., Http3RequestStreamInboundHandler.channelRead).
  # LogSanitizer's String/CharSequence overloads are intentional.
  - exclude:
      id: java/confusing-method-signature

  # Java records expose component accessors by design. Our records use
  # List.copyOf() for defensive immutability, which CodeQL can't track.
  - exclude:
      id: java/internal-representation-exposure

  # Public API and interface methods retain parameters for contract
  # compatibility even when current implementations don't use them.
  - exclude:
      id: java/unused-parameter

  # Test code intentionally calls deprecated methods to verify their
  # contract (e.g., that reset() is a no-op). Suppress to avoid noise.
  - exclude:
      id: java/deprecated-call

  # TlsFingerprint implements JA3/JA3S TLS fingerprinting, which mandates MD5
  # as the hash function (non-cryptographic identifier, not for security).
  # SelfSignedCertificate uses EC P-256 (secp256r1) which CodeQL flags as
  # "potentially weak" but is a strong, NIST-approved curve for test certs.
  # Excluding this query prevents false positives that cannot be fixed without
  # breaking protocol compatibility or weakening the test infrastructure.
  - exclude:
      id: java/potentially-weak-cryptographic-algorithm

  # ServiceDiscoveryServerHttpsTest uses a trust-all TrustManager and hostname
  # verifier to connect to a local server running with a self-signed certificate
  # during integration tests. This is the standard pattern for test HTTPS clients
  # and is not a security risk in the test execution environment.
  - exclude:
      id: java/insecure-trustmanager

  - exclude:
      id: java/unsafe-hostname-verification

  # StickySessionSearchComparator is a utility comparator retained as part of
  # the public L7 session-persistence API surface. CodeQL cannot detect external
  # callers outside this repository.
  - exclude:
      id: java/unused-reference-type
