name: scheduled-scans

# S35 consolidation: the informational / continuous-monitoring scans that do
# NOT need to block every PR live here and run on a weekly schedule (plus manual
# dispatch). This replaces:
#   * codeql.yml  — a WEEKLY `cargo audit` (its file was misnamed; it never ran
#     CodeQL). Folded in below as a STRICT `cargo audit -D warnings` (the
#     per-PR strict audit already runs in ci.yml). Strengthened, cadence kept.
#   * ci.yml `geiger` (Unsafe Inventory) + `machete` (Unused Deps) — were
#     `continue-on-error` informational on the PR path; moved here so they no
#     longer gate PRs but STILL RUN weekly (the S34-deferred plan; R7).
# See audit/ci/s35-gate-map.md for the before->after accounting (0 gates dropped).

on:
  schedule:
    # weekly, Sunday 10:54 UTC — preserves codeql.yml's original cadence.
    - cron: '54 10 * * 0'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  audit:
    name: Dependency Audit (weekly, strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup
      - name: Install cargo-audit
        run: cargo +stable install cargo-audit --locked
      # SEC-2-07: fail on ANY RUSTSEC advisory. Explicit ignores live in
      # .cargo/audit.toml with a justification + link. Catches advisories newly
      # published against unchanged deps between PRs (the value of the schedule).
      - name: cargo audit -D warnings
        run: cargo audit -D warnings

  geiger:
    # SEC-2-07: cargo-geiger counts unsafe blocks. Informational — every unsafe
    # site is justified in audit/unsafe-justifications.md per Round-7 spec, so we
    # capture the JSON inventory and archive it rather than failing the build.
    name: Unsafe Inventory (cargo-geiger)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup
      - name: Install cargo-geiger
        run: cargo +stable install cargo-geiger --locked
      - name: cargo geiger
        # `--output-format Json` lets a downstream gate parse the totals; we tee
        # the human-readable form to the job log too.
        run: |
          cargo geiger --all-features --output-format Json > geiger.json
          cargo geiger --all-features || true
      - name: Upload geiger inventory
        uses: actions/upload-artifact@v7
        with:
          name: cargo-geiger-inventory
          path: geiger.json
          retention-days: 30

  machete:
    # SEC-2-07: cargo-machete flags unused dependencies. GREEN as of S35 (17
    # genuinely-unused deps were removed). Off the PR critical path: a future
    # unused dep makes THIS weekly run red (surfaced, loud) without blocking
    # PRs — matching machete's documented false-positive-prone nature on
    # feature-gated re-exports.
    name: Unused Deps (cargo-machete)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup
        with:
          cache: 'false'
      - name: Install cargo-machete
        run: cargo +stable install cargo-machete --locked
      - name: cargo machete
        run: cargo machete
