name: CI

on:
  push:
    branches: [main, rust]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # --all-features is REQUIRED: the R8 memory integration tests in tests/
      # read lb-l7's `#[cfg(feature = "test-gauges")]` gauges, forwarded by the
      # root crate's `test-gauges` feature. Off by default; the canonical
      # session gate has always built with --all-features (Cargo.toml:7-12).
      - name: cargo check
        run: cargo check --workspace --all-targets --all-features

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Mirror the canonical session gate (--all-features = test-gauges) +
      # --no-fail-fast. The heavy real-wire e2e binaries (grpc_h3_e2e, ws_*)
      # already self-serialize via an in-file `static SUITE_SERIAL` tokio Mutex,
      # and `cargo test` runs test binaries sequentially.
      #
      # CF-FCAP1-FLAKE / CF-SATURATION-1: fcap1_h2_over_cap_upload_yields_413
      # must push a 66 MiB body past the 64 MiB cap to assert 413. On the 4-core
      # hosted runner, sharing CPU with its ~14 sibling tests starves that upload
      # (it stalls or the conn breaks before the cap — observed multiple modes),
      # so it is isolated and run ALONE here (full CPU, uncontended → reliably
      # reaches the cap). This is serialization, not weakening: same test, same
      # `assert_eq!(status, 413)`. Everything ELSE runs parallel first.
      - name: cargo test (suite minus the saturation-isolated fcap1)
        run: cargo test --workspace --all-features --no-fail-fast -- --skip fcap1_h2_over_cap_upload_yields_413
        timeout-minutes: 45
      - name: cargo test (fcap1 over-cap, isolated / serial)
        run: |
          cargo test -p lb-integration-tests --test h2h1_md_streaming_verify \
            --all-features -- --exact fcap1_h2_over_cap_upload_yields_413 --nocapture
        timeout-minutes: 15

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt
        run: cargo fmt --all -- --check

  doc-lint:
    # REL-2-01 + ROUND8-OPS-09 + ROUND8-L4-10: guard the
    # operator-facing docs against drift AND verify every
    # `Status: Verified-Fixed(<sha>)` audit claim resolves to a
    # SHA whose diff actually closes the recommendation.
    name: Doc Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Tier 2 (audit-of-audit) walks `git cat-file` / `git show`
          # / `git ls-tree` against historical SHAs cited in
          # Verified-Fixed claims. Need full history.
          fetch-depth: 0

      - name: Run doc-lint (tier-1 stale patterns + tier-2 audit-of-audit)
        run: bash scripts/ci/doc-lint.sh

  panic-freedom:
    name: Panic Freedom Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify panic-freedom deny lints are present
        run: |
          MISSING=""
          for lib in crates/*/src/lib.rs; do
            # Match the deny attribute even when it spans multiple lines
            # (e.g. `#![deny(\n    clippy::unwrap_used, ...\n)]`).
            if ! grep -Pzoq '#!\[deny\([^)]*clippy::unwrap_used' "$lib" 2>/dev/null; then
              MISSING="$MISSING\n  $lib"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Crates missing panic-freedom deny lints:$MISSING"
            exit 1
          fi
          echo "All library crates have panic-freedom deny lints."

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Newer cargo-audit needs a recent rustc to compile; the repo's
      # rust-toolchain.toml pins 1.88, and we use `+stable` here so cargo-audit
      # always builds on the latest toolchain independent of the project MSRV.
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo +stable install cargo-audit --locked

      # SEC-2-07: fail on ANY RUSTSEC advisory. Explicit ignores must
      # be added to .cargo/audit.toml with a justification + link.
      - name: cargo audit -D warnings
        run: cargo audit -D warnings

  # S34 dedup: cargo-deny ran here AND as prod-readiness-gates'
  # `gate-07-cargo-deny`. Removed this duplicate; gate-07 is the single source
  # (it now runs the same explicit `check licenses advisories bans sources`
  # subcommand list, so the gate scope is preserved, not shrunk).

  geiger:
    # SEC-2-07: cargo-geiger counts unsafe blocks. Informational —
    # every unsafe site is justified in audit/unsafe-justifications.md
    # per Round-7 spec, so we capture the JSON inventory and archive
    # it as an artifact rather than failing the build on unsafe.
    name: Unsafe Inventory (cargo-geiger)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-geiger
        run: cargo +stable install cargo-geiger --locked

      - name: cargo geiger
        # `--output-format Json` lets a downstream gate parse the
        # totals; `--all-features` covers the optional surfaces; we
        # tee the human-readable form to the job log too.
        run: |
          cargo geiger --all-features --output-format Json > geiger.json
          cargo geiger --all-features || true

      - name: Upload geiger inventory
        uses: actions/upload-artifact@v4
        with:
          name: cargo-geiger-inventory
          path: geiger.json
          retention-days: 30

  machete:
    # SEC-2-07: cargo-machete flags unused dependencies. Soft check —
    # known feature-gated re-exports occasionally false-positive, so
    # this job is informational unless an operator wires it into the
    # required set in branch protection.
    name: Unused Deps (cargo-machete)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-machete
        run: cargo +stable install cargo-machete --locked

      - name: cargo machete
        run: cargo machete

  msrv:
    # MSRV moved 1.85 -> 1.88 at S31 (quiche 0.29.1 + tokio-quiche 0.19
    # hard-require Rust 1.88). The old 1.85 pin was BOTH wrong and a no-op:
    # rust-toolchain.toml (channel = "1.88") overrode it, so the job silently
    # ran 1.88. Pin 1.88 explicitly so the gate asserts the real MSRV.
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSRV Rust toolchain
        uses: dtolnay/rust-toolchain@1.88

      - uses: Swatinem/rust-cache@v2

      - name: cargo check (MSRV)
        run: cargo check --workspace --all-targets --all-features

  fuzz-smoke:
    name: Fuzz Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly (for cargo-fuzz)
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Smoke test all fuzz targets (10 seconds each)
        run: |
          cd fuzz
          targets=$(cargo +nightly fuzz list)
          if [ -z "$targets" ]; then
            echo "::error::No fuzz targets discovered in fuzz/Cargo.toml"
            exit 1
          fi
          for target in $targets; do
            echo "::group::Fuzzing $target"
            cargo +nightly fuzz run "$target" -- -max_total_time=10 2>&1
            echo "::endgroup::"
          done

  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    needs: [check, clippy, test, fmt, panic-freedom, doc-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo build --release
        run: cargo build --workspace --release
        timeout-minutes: 30

  # S34 dedup: the Docker image was built here AND by prod-readiness-gates'
  # `D5-image-scan` (which builds the same docker/Dockerfile and additionally
  # runs the Trivy image scan). Removed this duplicate build; D5 is the single
  # source that both builds and scans the image.
