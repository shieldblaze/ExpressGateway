name: CI

on:
  push:
    branches: [main, rust]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# S35 consolidation: shared checkout+toolchain+cache setup is single-sourced via
# ./.github/actions/rust-setup (R12). The informational scans that used to live
# here (cargo-geiger "Unsafe Inventory", cargo-machete "Unused Deps") moved OFF
# the PR critical path to .github/workflows/scheduled-scans.yml — they STILL RUN
# (weekly), just not blocking every PR. See audit/ci/s35-gate-map.md.
jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup
      # --all-features is REQUIRED: the R8 memory integration tests in tests/
      # read lb-l7's `#[cfg(feature = "test-gauges")]` gauges, forwarded by the
      # root crate's `test-gauges` feature. Off by default; the canonical
      # session gate has always built with --all-features (Cargo.toml:7-12).
      - name: cargo check
        run: cargo check --workspace --all-targets --all-features

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup
        with:
          components: clippy
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup

      # Mirror the canonical session gate (--all-features = test-gauges) +
      # --no-fail-fast. The heavy real-wire e2e binaries (grpc_h3_e2e, ws_*)
      # already self-serialize via an in-file `static SUITE_SERIAL` tokio Mutex,
      # and `cargo test` runs test binaries sequentially.
      #
      # CF-FCAP1-FLAKE / CF-SATURATION-1: fcap1_h2_over_cap_upload_yields_413
      # must push a 66 MiB body past the 64 MiB cap to assert 413. On the 4-core
      # hosted runner, sharing CPU with its ~14 sibling tests starves that upload
      # (it stalls or the conn breaks before the cap — observed multiple modes),
      # so it is isolated and run ALONE here (full CPU, uncontended → reliably
      # reaches the cap). This is serialization, not weakening: same test, same
      # `assert_eq!(status, 413)`. Everything ELSE runs parallel first.
      - name: cargo test (suite minus the saturation-isolated fcap1)
        run: cargo test --workspace --all-features --no-fail-fast -- --skip fcap1_h2_over_cap_upload_yields_413
        timeout-minutes: 45
      - name: cargo test (fcap1 over-cap, isolated / serial, retry on env-flake)
        # fcap1 must transfer 66 MiB past the const 64 MiB cap; on a hosted
        # runner the achievable rate varies (~0.3–1.1 MiB/s) so a single attempt
        # can still be starved by a noisy neighbour even when isolated. The
        # gateway deadlines are raised to 300 s (see the test), and we allow up
        # to 3 attempts: a genuine cap regression fails ALL three (assertion
        # unchanged), only a slow-transfer env-flake is retried. CF-SATURATION-1.
        run: |
          for attempt in 1 2 3; do
            echo "::group::fcap1 attempt $attempt"
            if cargo test -p lb-integration-tests --test h2h1_md_streaming_verify \
                 --all-features -- --exact fcap1_h2_over_cap_upload_yields_413 --nocapture; then
              echo "::endgroup::"; echo "fcap1 passed on attempt $attempt"; exit 0
            fi
            echo "::endgroup::"; echo "fcap1 attempt $attempt failed (env throughput?); retrying"
          done
          echo "::error::fcap1 failed all 3 attempts — this is a real cap-enforcement failure, not an env flake"
          exit 1
        timeout-minutes: 25

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup
        with:
          components: rustfmt
          cache: 'false'
      - name: cargo fmt
        run: cargo fmt --all -- --check

  doc-lint:
    # REL-2-01 + ROUND8-OPS-09 + ROUND8-L4-10: guard the
    # operator-facing docs against drift AND verify every
    # `Status: Verified-Fixed(<sha>)` audit claim resolves to a
    # SHA whose diff actually closes the recommendation.
    name: Doc Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Tier 2 (audit-of-audit) walks `git cat-file` / `git show`
          # / `git ls-tree` against historical SHAs cited in
          # Verified-Fixed claims. Need full history.
          fetch-depth: 0
      - name: Run doc-lint (tier-1 stale patterns + tier-2 audit-of-audit)
        run: bash scripts/ci/doc-lint.sh

  panic-freedom:
    name: Panic Freedom Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify panic-freedom deny lints are present
        run: |
          MISSING=""
          for lib in crates/*/src/lib.rs; do
            # Match the deny attribute even when it spans multiple lines
            # (e.g. `#![deny(\n    clippy::unwrap_used, ...\n)]`).
            if ! grep -Pzoq '#!\[deny\([^)]*clippy::unwrap_used' "$lib" 2>/dev/null; then
              MISSING="$MISSING\n  $lib"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Crates missing panic-freedom deny lints:$MISSING"
            exit 1
          fi
          echo "All library crates have panic-freedom deny lints."

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Newer cargo-audit needs a recent rustc to compile; the repo's
      # rust-toolchain.toml pins 1.88, and we use `+stable` here so cargo-audit
      # always builds on the latest toolchain independent of the project MSRV.
      - uses: ./.github/actions/rust-setup
      - name: Install cargo-audit
        run: cargo +stable install cargo-audit --locked
      # SEC-2-07: fail on ANY RUSTSEC advisory. Explicit ignores must
      # be added to .cargo/audit.toml with a justification + link.
      # This is the per-PR/push audit; a weekly schedule of the SAME strict
      # audit runs in scheduled-scans.yml (folds the old codeql.yml job, which
      # ran a WEAKER `cargo audit` without -D warnings — strengthened, not
      # weakened). See audit/ci/s35-gate-map.md.
      - name: cargo audit -D warnings
        run: cargo audit -D warnings

  # S34 dedup: cargo-deny ran here AND as prod-readiness-gates'
  # `gate-07-cargo-deny`. Removed this duplicate; gate-07 is the single source
  # (it now runs the same explicit `check licenses advisories bans sources`
  # subcommand list, so the gate scope is preserved, not shrunk).
  #
  # S35: the cargo-geiger "Unsafe Inventory" and cargo-machete "Unused Deps"
  # jobs moved to scheduled-scans.yml (weekly) — they were already
  # `continue-on-error` informational and are now off the PR critical path
  # (the S34-deferred plan; named in s35-gate-map.md). machete is GREEN as of
  # S35 (17 genuinely-unused deps removed).

  msrv:
    # MSRV moved 1.85 -> 1.88 at S31 (quiche 0.29.1 + tokio-quiche 0.19
    # hard-require Rust 1.88). `cargo check --all-targets --all-features` on the
    # MSRV toolchain is the canonical "compiles on the pinned MSRV" gate; the
    # full-codegen build runs in `release-build` (stable). This subsumes the old
    # prod-readiness `build-and-lint` MSRV build (folded at S35).
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: '1.88'
      - name: cargo check (MSRV)
        run: cargo check --workspace --all-targets --all-features

  fuzz-smoke:
    name: Fuzz Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Smoke test all fuzz targets (10 seconds each)
        run: |
          cd fuzz
          targets=$(cargo +nightly fuzz list)
          if [ -z "$targets" ]; then
            echo "::error::No fuzz targets discovered in fuzz/Cargo.toml"
            exit 1
          fi
          for target in $targets; do
            echo "::group::Fuzzing $target"
            cargo +nightly fuzz run "$target" -- -max_total_time=10 2>&1
            echo "::endgroup::"
          done

  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    needs: [check, clippy, test, fmt, panic-freedom, doc-lint]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup
      - name: cargo build --release
        run: cargo build --workspace --release
        timeout-minutes: 30

  # S34 dedup: the Docker image was built here AND by prod-readiness-gates'
  # `D5-image-scan`. Removed this duplicate; D5 is the single source that builds
  # the image, and as of S35 also RUNS it and smoke-tests a real request
  # through the live container (scripts/ci/docker-smoke.sh) before Trivy-scanning.
