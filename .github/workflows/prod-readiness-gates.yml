# Production-readiness gates for ExpressGateway (L7 LB + L4 XDP).
#
# Covers the Round-8 deferred gates that need a real CI environment:
#   gate-07  cargo-deny           (also verified locally 2026-05-16: PASS)
#   D-6      cargo-llvm-cov       hot-path coverage >= 80% PER MODULE
#   D-4      h2spec / h3spec      HTTP/2 + HTTP/3 conformance
#   D-3a     chaos ATTACK suite   Rapid Reset / CONTINUATION / HPACK / slowloris
#   D-5      docker build+SMOKE+trivy   real image build, RUN+SERVE proof, scan
#   D-2      bpftool verifier     XDP load on the runner kernel
#
# NOT covered here (need real hardware — see D1-soak-runbook.md):
#   D-1      native-mode XDP attach on a production ENA NIC
#   D-3b     4-hour soak / leak detection
#
# S35 consolidation: the old `build-and-lint` job (fmt + clippy + build on the
# MSRV toolchain) was FOLDED OUT — its fmt/clippy are covered (identically /
# more strictly) by ci.yml's `fmt` + `clippy` (stable), and "compiles on the
# 1.88 MSRV" is the `msrv` job (cargo check, all-targets, all-features) plus the
# full-codegen `release-build`. The shared toolchain/cache/system-deps setup is
# single-sourced via ./.github/actions/rust-setup (R12). The per-job `needs:
# build-and-lint` edges were removed (each heavy gate self-builds). See
# audit/ci/s35-gate-map.md for the before->after accounting (0 gates dropped).

name: prod-readiness-gates

on:
  push:
    branches: [prod-readiness/round-4, main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # MSRV — matches rust-toolchain.toml (moved 1.85 -> 1.88 at S31 for quiche
  # 0.29.1). cargo-deny needs its own newer toolchain (see the gate-07 job).
  RUST_MSRV: "1.88"

jobs:

  # ---------------------------------------------------------------
  # gate-07 — cargo-deny (advisories / licenses / bans / sources)
  # cargo-deny is a standalone prebuilt binary (no toolchain needed). It is the
  # SINGLE cargo-deny gate (the duplicate ci.yml `deny` job was removed at S34).
  # The explicit subcommand list keeps a future cargo-deny "check" default from
  # silently shrinking the gate.
  # ---------------------------------------------------------------
  gate-07-cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-deny (prebuilt binary, no toolchain needed)
        run: |
          VER=0.19.6
          curl -fsSL "https://github.com/EmbarkStudios/cargo-deny/releases/download/${VER}/cargo-deny-${VER}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz --strip-components=1 -C /usr/local/bin --wildcards '*/cargo-deny'
          cargo-deny --version
      - name: cargo-deny check
        run: cargo-deny check licenses advisories bans sources

  # ---------------------------------------------------------------
  # D-6 — hot-path coverage, PER-MODULE >= 80% (per audit/coverage-scope.md).
  #
  # The charter's metric is PER-MODULE line coverage on the named hot-path
  # modules, NOT a whole-package aggregate. This job (1) runs the FULL workspace
  # test suite under instrumentation (so the integration tests actually exercise
  # the hot paths) and (2) enforces >= 80% PER hot-path module via
  # scripts/ci/coverage-check.sh, with lb-l4-xdp/src/loader.rs carved out by
  # name (XDP load needs root; smoke-validated by D2-xdp-verifier-smoke). A new
  # hot-path module under 80% turns this RED.
  # ---------------------------------------------------------------
  D6-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: ${{ env.RUST_MSRV }}
          components: llvm-tools-preview
          system-deps: 'true'
      - name: Free runner disk (instrumented --workspace build is ~28 GB)
        # The full-workspace instrumented coverage target is large; reclaim the
        # preinstalled toolchains the gateway build does not use so it fits.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL \
            /usr/share/swift 2>/dev/null || true
          df -h /
      - name: Install cargo-llvm-cov + nextest
        run: |
          curl -fsSL https://github.com/taiki-e/cargo-llvm-cov/releases/latest/download/cargo-llvm-cov-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C ~/.cargo/bin
          curl -fsSL https://get.nexte.st/latest/linux | tar -xz -C ~/.cargo/bin
      - name: Coverage (full workspace suite, --all-features)
        # --ignore-run-fail: D-6 is the COVERAGE gate, not the pass/fail gate
        # (that is the CI "Test" job). Measure what the suite covers even if a
        # test flakes; coverage-check.sh below is the actual verdict.
        run: |
          cargo llvm-cov nextest \
            --workspace --all-features --ignore-run-fail \
            --lcov --output-path coverage.lcov
      - name: Enforce per-module hot-path threshold (charter metric)
        run: bash scripts/ci/coverage-check.sh coverage.lcov
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-lcov
          path: coverage.lcov

  # ---------------------------------------------------------------
  # D-4 — HTTP/2 + HTTP/3 conformance (h2spec --strict, h3spec).
  #
  # Boots the REAL gateway with two listeners in front of a stub backend:
  #   * an `h1s` listener (TLS, ALPN h2/http1.1) on TCP :8443  -> h2spec
  #   * a  `quic` listener (H3-terminate, quiche::h3) on UDP :8444 -> h3spec
  # Tool versions are PINNED so the h3spec waiver list (CF-QUICHE-UPGRADE) stays
  # exact.
  # ---------------------------------------------------------------
  D4-conformance:
    runs-on: ubuntu-latest
    env:
      H2SPEC_VER: "v2.6.0"
      H3SPEC_VER: "v0.1.13"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: ${{ env.RUST_MSRV }}
          system-deps: 'true'
      - run: cargo build -p lb
      - name: Stub backend + test cert/key + QUIC retry secret
        run: |
          # Minimal H1 upstream the gateway proxies to (both listeners).
          python3 -m http.server 3000 >/tmp/backend.log 2>&1 &
          echo $! > backend.pid
          # Self-signed cert (DNS + IP SANs); h2spec uses -k and h3spec uses -n
          # so cert *validation* is skipped — this is protocol conformance, not
          # PKI — but the cert must still load into rustls + BoringSSL.
          openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem \
            -days 1 -nodes -subj "/CN=localhost" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"
          head -c 32 /dev/urandom > retry.bin
      - name: Write conformance config (lb-config schema)
        run: |
          cat > conformance.toml <<TOML
          [runtime]
          drain_timeout_ms = 5000
          readiness_settle_ms = 100

          # H1+H2 over TLS (ALPN h2 then http/1.1) -> h2spec target (TCP).
          [[listeners]]
          address  = "127.0.0.1:8443"
          protocol = "h1s"
          [listeners.tls]
          cert_path = "$PWD/cert.pem"
          key_path  = "$PWD/key.pem"
          [[listeners.backends]]
          address  = "127.0.0.1:3000"
          protocol = "h1"
          weight   = 1

          # HTTP/3 over QUIC, H3-terminate (quiche::h3) -> h3spec target (UDP).
          [[listeners]]
          address  = "127.0.0.1:8444"
          protocol = "quic"
          [listeners.quic]
          cert_path         = "$PWD/cert.pem"
          key_path          = "$PWD/key.pem"
          retry_secret_path = "$PWD/retry.bin"
          [[listeners.backends]]
          address  = "127.0.0.1:3000"
          protocol = "h1"
          weight   = 1

          [observability]
          metrics_bind = "127.0.0.1:9090"
          TOML
          cat conformance.toml
      - name: Boot gateway + wait for BOTH listeners
        run: |
          ./target/debug/expressgateway conformance.toml >/tmp/gw.log 2>&1 &
          echo $! > gw.pid
          up=0
          for i in $(seq 1 40); do
            if ss -ltn | grep -q ':8443' && ss -lun | grep -q ':8444'; then up=1; break; fi
            sleep 1
          done
          if [ "$up" -ne 1 ]; then
            echo "::error::gateway listeners did not come up"; cat /tmp/gw.log; exit 1
          fi
          echo "both listeners up; gateway log:"; tail -5 /tmp/gw.log
      - name: h2spec --strict (HTTP/2 conformance, TCP :8443)
        run: |
          curl -fsSL "https://github.com/summerwind/h2spec/releases/download/${H2SPEC_VER}/h2spec_linux_amd64.tar.gz" | tar -xz
          # -k: skip cert validation (protocol conformance, not PKI). --strict:
          # fail on ANY non-conformant case. The gateway passes 147/147.
          ./h2spec -t -k -h 127.0.0.1 -p 8443 --strict
      - name: h3spec (HTTP/3 conformance, UDP :8444) via named-waiver gate
        run: |
          curl -fsSL -o h3spec "https://github.com/kazu-yamamoto/h3spec/releases/download/${H3SPEC_VER}/h3spec-linux-x86_64"
          chmod +x h3spec
          # The wrapper runs h3spec -n and PASSES iff every failure is one of the
          # 12 individually-named, documented quiche-0.29 limitations
          # (CF-QUICHE-UPGRADE). A NEW/un-waived failure turns this RED.
          bash scripts/ci/h3spec-check.sh ./h3spec 127.0.0.1 8444
      - name: Stop gateway + backend
        if: always()
        run: |
          kill "$(cat gw.pid)" 2>/dev/null || true
          kill "$(cat backend.pid)" 2>/dev/null || true

  # ---------------------------------------------------------------
  # D-3a — chaos ATTACK suite (the half that does not need a soak host)
  # Rapid Reset, CONTINUATION flood, HPACK bomb, slowloris.
  # The 4-hour soak (D-3b) is NOT here — see D1-soak-runbook.md.
  # ---------------------------------------------------------------
  D3a-chaos-attacks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: ${{ env.RUST_MSRV }}
          system-deps: 'true'
      - name: Install cargo-nextest
        run: curl -fsSL https://get.nexte.st/latest/linux | tar -xz -C ~/.cargo/bin
      - run: cargo build -p lb
      - name: Run chaos attack suite
        # The in-repo attack harness: Round-8 wired Smuggle/Slowloris/SlowPost
        # detectors + the CONTINUATION/Rapid-Reset caps. --all-features keeps
        # the lb-l7/lb-h2 test surface identical to the session gate.
        run: |
          cargo nextest run --all-features --package lb-h2 --package lb-l7 \
            -E 'test(/chaos|rapid_reset|continuation|hpack|slowloris/)'

  # ---------------------------------------------------------------
  # D-5 — container image: real docker build + RUN+SERVE smoke + trivy scan.
  #
  # S35: D5 now builds the image ONCE and (a) proves it actually BOOTS and
  # SERVES L7 traffic via scripts/ci/docker-smoke.sh — a real HTTP/1.1 request
  # through the live container must return the backend's 200 + body — and only
  # then (b) Trivy-scans the same image. `docker build` exit-0 alone was never
  # proof the container works (the pre-S35 image had a wrong CMD that could not
  # boot — caught here now). A `trivy fs` on the source tree is NOT a substitute
  # for the real image scan and must not be logged as D-5 pass.
  # ---------------------------------------------------------------
  D5-image-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: |
          docker build -f docker/Dockerfile \
            --build-arg GIT_SHA="${GITHUB_SHA::8}" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg VERSION="ci-${GITHUB_SHA::8}" \
            -t expressgateway:ci .
      - name: Smoke — RUN the container and serve a real request through it
        # Boots expressgateway:ci with a plaintext H1 smoke config + a backend
        # container on a user-defined network, then curls a real request THROUGH
        # the running gateway and asserts 200 + the backend body. Proves
        # serve-not-just-build. Fails the job on any boot/serve failure.
        run: IMAGE=expressgateway:ci bash scripts/ci/docker-smoke.sh
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: expressgateway:ci
          format: table
          exit-code: "1"                 # fail the job on findings
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  # ---------------------------------------------------------------
  # D-2 — XDP verifier-accept smoke (RUNNER-KERNEL ONLY).
  #
  # SCOPE (S34, honest-green rescope): this job loads the committed XDP ELF
  # (crates/lb-l4-xdp/src/lb_xdp.bin) into the verifier of the runner's OWN
  # kernel (GitHub hosted = Linux 6.x) and asserts ACCEPT. That is a TRUE,
  # meaningful claim: "the shipped XDP object builds and the in-kernel verifier
  # on a current kernel accepts it." It does NOT cover the full 5.15/6.1/6.6
  # matrix (that needs nested virt the hosted runners lack — escalated as
  # F-ESC-1, self-hosted; see audit/ci/s34-report.md + D1-soak-runbook.md).
  # ---------------------------------------------------------------
  D2-xdp-verifier-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: ${{ env.RUST_MSRV }}
          system-deps: 'true'
      - name: Print runner kernel (for the record — smoke is THIS kernel only)
        run: uname -r
      - name: Build the real-load verifier test (validates the embedded ELF too)
        # Build as the normal user so target artifacts aren't root-owned; the
        # sudo step below reuses this binary.
        run: cargo test -p lb-l4-xdp --test round8_verifier_baseline_70 --no-run
      - name: Load the committed XDP ELF and assert verifier ACCEPT
        # The committed ELF (built by scripts/build-xdp.sh) uses aya LEGACY map
        # definitions, which libbpf v1.0+ tools (bpftool, ip) REFUSE to load.
        # aya is the only loader that can load it — and it is the gateway's OWN
        # loader. round8_verifier_baseline_70 does a genuine BPF_PROG_LOAD via
        # XdpLoader::load_from_bytes_pinned + kernel_load on the RUNNING kernel
        # (no NIC/attach needed) and asserts real kernel facts (prog_id, tag,
        # verified_insns > 0). It needs CAP_BPF + bpffs, hence sudo + --ignored.
        run: |
          set -euo pipefail
          sudo -E env "PATH=$PATH" cargo test -p lb-l4-xdp \
            --test round8_verifier_baseline_70 -- --ignored --nocapture
