syntax = "proto3";

package com.shieldblaze.expressgateway.controlplane.v1;

option java_package = "com.shieldblaze.expressgateway.controlplane.v1";
option java_multiple_files = true;
option java_outer_classname = "NodeRegistrationProto";

import "com/shieldblaze/expressgateway/controlplane/v1/common.proto";

// Handles data-plane node lifecycle: registration, deregistration, and heartbeat.
service NodeRegistrationService {
  // Register a new data-plane node with the control plane.
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Deregister a node (graceful shutdown / maintenance).
  rpc Deregister(DeregisterRequest) returns (DeregisterResponse);

  // Bidirectional heartbeat stream. The node sends periodic beats; the control
  // plane responds with acknowledgements or operational directives.
  rpc Heartbeat(stream NodeHeartbeat) returns (stream HeartbeatResponse);
}

message RegisterRequest {
  NodeIdentity identity = 1;
  repeated string subscribed_resource_types = 2;
  repeated ResourceVersion current_versions = 3;
  string auth_token = 4;
}

message RegisterResponse {
  bool accepted = 1;
  string session_token = 2;
  string reject_reason = 3;
  string control_plane_id = 4;
  bool is_leader = 5;
  int64 heartbeat_interval_ms = 6;
  string leader_address = 7;
}

message DeregisterRequest {
  string node_id = 1;
  string session_token = 2;
  DeregistrationReason reason = 3;
}

enum DeregistrationReason {
  UNKNOWN = 0;
  SHUTDOWN = 1;
  RESTART = 2;
  MAINTENANCE = 3;
}

message DeregisterResponse {
  bool acknowledged = 1;
}

message NodeHeartbeat {
  string node_id = 1;
  string session_token = 2;
  Timestamp timestamp = 3;
  NodeHealthStatus health_status = 4;
  // Full resource version set, sent every Nth heartbeat to allow the control
  // plane to detect version drift without a full config resync.
  repeated ResourceVersion resource_versions = 5;
  int64 active_connections = 6;
  double cpu_utilization = 7;
  double memory_utilization = 8;
}

message HeartbeatResponse {
  Timestamp timestamp = 1;
  repeated HeartbeatDirective directives = 2;
}

message HeartbeatDirective {
  oneof directive {
    bool ack = 1;
    ReconnectDirective reconnect = 2;
    ResubscribeDirective resubscribe = 3;
  }
}

message ReconnectDirective {
  string target_address = 1;
  string reason = 2;
  int64 deadline_ms = 3;
}

message ResubscribeDirective {
  repeated string resource_types = 1;
}
