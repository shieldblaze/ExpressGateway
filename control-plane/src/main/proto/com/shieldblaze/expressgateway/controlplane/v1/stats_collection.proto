syntax = "proto3";

package com.shieldblaze.expressgateway.controlplane.v1;

option java_package = "com.shieldblaze.expressgateway.controlplane.v1";
option java_multiple_files = true;
option java_outer_classname = "StatsCollectionProto";

import "com/shieldblaze/expressgateway/controlplane/v1/common.proto";

// Collects telemetry from data-plane nodes. The control plane can adjust
// reporting frequency and detail level via StatsAck directives.
service StatsCollectionService {
  rpc ReportStats(stream NodeStatsReport) returns (stream StatsAck);
}

message NodeStatsReport {
  string node_id = 1;
  string session_token = 2;
  Timestamp timestamp = 3;
  repeated ClusterStats cluster_stats = 4;
  repeated ListenerStats listener_stats = 5;
  SystemStats system_stats = 6;
}

message ClusterStats {
  string cluster_name = 1;
  repeated EndpointStats endpoint_stats = 2;
  int64 total_requests = 3;
  int64 total_connections = 4;
  int64 active_connections = 5;
  int64 total_rx_bytes = 6;
  int64 total_tx_bytes = 7;
  // Latency percentiles in microseconds.
  int64 latency_p50_us = 8;
  int64 latency_p90_us = 9;
  int64 latency_p99_us = 10;
  int64 latency_p999_us = 11;
  int64 connect_failures = 12;
  int64 request_timeouts = 13;
  int64 circuit_breaker_trips = 14;
}

message EndpointStats {
  string address = 1;
  int64 total_requests = 2;
  int64 active_connections = 3;
  int64 total_rx_bytes = 4;
  int64 total_tx_bytes = 5;
  int64 connect_failures = 6;
  NodeHealthStatus health_status = 7;
  int64 outstanding_requests = 8;
}

message ListenerStats {
  string listener_name = 1;
  string bind_address = 2;
  string protocol = 3;
  int64 total_connections = 4;
  int64 active_connections = 5;
  int64 total_rx_bytes = 6;
  int64 total_tx_bytes = 7;
}

message SystemStats {
  double cpu_usage_percent = 1;
  int64 memory_used_bytes = 2;
  int64 memory_total_bytes = 3;
  int64 open_file_descriptors = 4;
  int64 uptime_seconds = 5;
}

message StatsAck {
  Timestamp timestamp = 1;
  // Control plane can instruct the node to change its reporting interval.
  int64 next_report_interval_ms = 2;
  // When true, the node should reduce the detail level of subsequent reports
  // (e.g. drop per-endpoint stats) to lower bandwidth.
  bool reduce_detail_level = 3;
}
