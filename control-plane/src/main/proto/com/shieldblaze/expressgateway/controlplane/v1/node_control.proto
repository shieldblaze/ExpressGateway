syntax = "proto3";

package com.shieldblaze.expressgateway.controlplane.v1;

option java_package = "com.shieldblaze.expressgateway.controlplane.v1";
option java_multiple_files = true;
option java_outer_classname = "NodeControlProto";

import "com/shieldblaze/expressgateway/controlplane/v1/common.proto";

// Allows the control plane to send operational commands to data-plane nodes.
// Supports both request/response (SendCommand) and streaming (StreamCommands).
service NodeControlService {
  // Send a single command and wait for the response.
  rpc SendCommand(NodeCommand) returns (CommandResponse);

  // Bidirectional command stream. The control plane pushes commands; the node
  // sends back acknowledgements as each command is processed.
  rpc StreamCommands(stream CommandAck) returns (stream NodeCommand);
}

message NodeCommand {
  string command_id = 1;
  string node_id = 2;
  Timestamp timestamp = 3;
  oneof command {
    DrainCommand drain = 4;
    UndrainCommand undrain = 5;
    ForceSyncCommand force_sync = 6;
    RestartCommand restart = 7;
  }
}

message DrainCommand {
  int64 timeout_seconds = 1;
}

message UndrainCommand {}

message ForceSyncCommand {
  repeated string resource_types = 1;
}

message RestartCommand {
  bool graceful = 1;
  int64 delay_seconds = 2;
}

message CommandResponse {
  string command_id = 1;
  ResponseStatus status = 2;
  string message = 3;
}

message CommandAck {
  string command_id = 1;
  bool success = 2;
  string error_message = 3;
}
