syntax = "proto3";

package com.shieldblaze.expressgateway.controlplane.v1;

option java_package = "com.shieldblaze.expressgateway.controlplane.v1";
option java_multiple_files = true;
option java_outer_classname = "ConfigTypesProto";

import "com/shieldblaze/expressgateway/controlplane/v1/common.proto";
import "google/protobuf/field_mask.proto";

// Schema version embedded in every config message for evolution tracking.
message SchemaVersionMsg {
  int32 major = 1;
  int32 minor = 2;
  int32 patch = 3;
}

// Listener configuration for a frontend bind point.
message ListenerConfigMsg {
  string name = 1;
  string bind_address = 2;
  int32 port = 3;
  // Protocol: TCP, UDP, QUIC
  string protocol = 4;
  // Optional TLS configuration reference name
  string tls_config_ref = 5;
  int32 max_connections = 6;
  int64 idle_timeout_ms = 7;
  SchemaVersionMsg version = 15;
}

// L7 routing rule configuration.
message RouteConfigMsg {
  string name = 1;
  string match_host = 2;
  string match_path = 3;
  map<string, string> match_headers = 4;
  string backend_cluster_ref = 5;
  int32 priority = 6;
  // Optional retry policy reference
  string retry_policy_ref = 7;
  int64 timeout_ms = 8;
  SchemaVersionMsg version = 15;
}

// Backend cluster configuration.
message BackendConfigMsg {
  string name = 1;
  // Node addresses in host:port format
  repeated string nodes = 2;
  // Strategy: round-robin, least-connection, random, ip-hash, weighted-round-robin
  string load_balance_strategy = 3;
  // Optional health check reference
  string health_check_ref = 4;
  // Optional circuit breaker reference
  string circuit_breaker_ref = 5;
  int32 max_connections_per_node = 6;
  int32 connection_pool_size = 7;
  SchemaVersionMsg version = 15;
}

// Rate limiting configuration.
message RateLimitConfigMsg {
  string name = 1;
  int64 requests_per_second = 2;
  int64 burst_size = 3;
  // Key extractor: IP, HEADER, PATH
  string key_extractor = 4;
  // Header name when key_extractor is HEADER
  string header_name = 5;
  int32 response_status_code = 6;
  int32 retry_after_seconds = 7;
  SchemaVersionMsg version = 15;
}

// Retry policy configuration.
message RetryPolicyConfigMsg {
  int32 max_retries = 1;
  // Conditions: 502, 503, 504, connect-failure, timeout, reset
  repeated string retry_on = 2;
  // Strategy: fixed, exponential, jittered
  string backoff_strategy = 3;
  int64 max_backoff_ms = 4;
  int64 per_try_timeout_ms = 5;
  SchemaVersionMsg version = 15;
}

// Circuit breaker configuration.
message CircuitBreakerConfigMsg {
  bool enabled = 1;
  int32 failure_threshold = 2;
  int32 success_threshold = 3;
  int32 half_open_requests = 4;
  int64 open_duration_ms = 5;
  int32 sliding_window_size = 6;
  int32 slow_call_threshold_pct = 7;
  int64 slow_call_duration_ms = 8;
  SchemaVersionMsg version = 15;
}

// Traffic shaping (bandwidth limiting) configuration.
message TrafficShapingConfigMsg {
  string name = 1;
  int64 max_bandwidth_bytes_per_sec = 2;
  int64 burst_bytes = 3;
  int64 per_connection_limit_bytes_per_sec = 4;
  int64 read_limit_bytes_per_sec = 5;
  int64 write_limit_bytes_per_sec = 6;
  SchemaVersionMsg version = 15;
}

// QUIC transport parameters (RFC 9000 Section 18).
message QuicPolicyConfigMsg {
  int64 max_idle_timeout_ms = 1;
  int32 max_udp_payload_size = 2;
  int64 initial_max_data = 3;
  int64 initial_max_stream_data_bidi_local = 4;
  int64 initial_max_stream_data_bidi_remote = 5;
  int64 initial_max_stream_data_uni = 6;
  int64 initial_max_streams_bidi = 7;
  int64 initial_max_streams_uni = 8;
  int32 ack_delay_exponent = 9;
  int64 max_ack_delay_ms = 10;
  bool disable_active_migration = 11;
  int32 active_connection_id_limit = 12;
  SchemaVersionMsg version = 15;
}

// Wraps any config type for CRUD operations through the control plane.
message ConfigEnvelope {
  string resource_id = 1;
  string kind = 2;
  string scope_qualifier = 3;
  int64 resource_version = 4;
  Timestamp created_at = 5;
  Timestamp updated_at = 6;
  string created_by = 7;
  map<string, string> labels = 8;
  SchemaVersionMsg schema_version = 9;

  // Exactly one config payload
  oneof config {
    ListenerConfigMsg listener = 10;
    RouteConfigMsg route = 11;
    BackendConfigMsg backend = 12;
    RateLimitConfigMsg rate_limit = 13;
    RetryPolicyConfigMsg retry_policy = 14;
    CircuitBreakerConfigMsg circuit_breaker = 16;
    TrafficShapingConfigMsg traffic_shaping = 17;
    QuicPolicyConfigMsg quic_policy = 18;
  }
}

// Partial update request supporting field masks for selective updates.
message PartialUpdateRequest {
  string resource_id = 1;
  // Field mask specifying which fields to update (google.protobuf.FieldMask).
  google.protobuf.FieldMask update_mask = 2;
  ConfigEnvelope partial_config = 3;
  // If true, validate the update without applying it.
  bool dry_run = 4;
}

// Validation result returned after a config operation.
message ValidationResultMsg {
  bool valid = 1;
  repeated ValidationErrorMsg errors = 2;
}

message ValidationErrorMsg {
  string field = 1;
  string message = 2;
  // Severity: ERROR, WARNING, INFO
  string severity = 3;
}

// Config management service for CRUD + partial update operations.
service ConfigManagementService {
  // Create or update a config resource.
  rpc UpsertConfig(ConfigEnvelope) returns (UpsertConfigResponse);

  // Get a config resource by ID.
  rpc GetConfig(GetConfigRequest) returns (ConfigEnvelope);

  // Delete a config resource by ID.
  rpc DeleteConfig(DeleteConfigRequest) returns (DeleteConfigResponse);

  // List config resources by kind and optional scope.
  rpc ListConfigs(ListConfigsRequest) returns (ListConfigsResponse);

  // Apply a partial update to an existing config resource.
  rpc PartialUpdateConfig(PartialUpdateRequest) returns (UpsertConfigResponse);

  // Validate a config resource without persisting it.
  rpc ValidateConfig(ConfigEnvelope) returns (ValidationResultMsg);
}

message UpsertConfigResponse {
  ResponseStatus status = 1;
  string message = 2;
  int64 new_version = 3;
  ValidationResultMsg validation = 4;
}

message GetConfigRequest {
  string resource_id = 1;
  string kind = 2;
  string scope_qualifier = 3;
}

message DeleteConfigRequest {
  string resource_id = 1;
  string kind = 2;
  string scope_qualifier = 3;
}

message DeleteConfigResponse {
  ResponseStatus status = 1;
  string message = 2;
}

message ListConfigsRequest {
  string kind = 1;
  string scope_qualifier = 2;
  map<string, string> label_selector = 3;
}

message ListConfigsResponse {
  repeated ConfigEnvelope configs = 1;
}
